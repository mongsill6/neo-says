services:
  neo-says-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NEO_SAYS_HOST=0.0.0.0
      - NEO_SAYS_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
