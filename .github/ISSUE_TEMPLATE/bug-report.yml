name: "🐛 버그 리포트 | Bug Report"
description: "버그를 발견했나요? 알려주세요! | Found a bug? Let us know!"
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그 리포트를 작성해 주셔서 감사합니다.
        Thank you for reporting a bug.
  - type: textarea
    id: description
    attributes:
      label: "버그 설명 | Bug Description"
      description: "무엇이 잘못되었는지 설명해 주세요 | Describe what went wrong"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "재현 방법 | Steps to Reproduce"
      description: "버그를 재현하는 단계를 알려주세요 | Steps to reproduce the bug"
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "기대 동작 | Expected Behavior"
      description: "어떻게 동작해야 하는지 설명해 주세요 | What should have happened"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "실제 동작 | Actual Behavior"
      description: "실제로 어떻게 동작했는지 설명해 주세요 | What actually happened"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: "운영체제 | OS"
      placeholder: "macOS 14.0 / Ubuntu 22.04 / Windows 11"
    validations:
      required: false
  - type: input
    id: shell
    attributes:
      label: "셸 | Shell"
      placeholder: "bash 5.2 / zsh 5.9 / fish 3.6"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: "로그 / 에러 메시지 | Logs / Error Messages"
      description: "관련 로그나 에러 메시지를 붙여넣으세요"
      render: shell
    validations:
      required: false
